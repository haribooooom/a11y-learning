<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>a11y-learning-new</title>
    <script>
      (function(l) {
        if (l.search[1] === 'p') {
          var query = l.search.slice(1).split('&');
          var p = query[0].slice(2).replace(/~and~/g, '&');
          var q = query[1] ? '?' + query[1].slice(2).replace(/~and~/g, '&') : '';
          window.history.replaceState(null, null, l.pathname + p + q + l.hash);
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
